version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pulseops-db
    restart: always
    environment:
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops123
      POSTGRES_DB: pulseops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
